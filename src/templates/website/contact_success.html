{% extends "base.html" %}

{% block title %}Message envoyé — {{ SITE_NAME }}{% endblock %}

{% block content %}
<section class="py-24 lg:py-32">
    <div class="mx-auto max-w-xl px-4 sm:px-6 lg:px-8 text-center">
        <div class="mx-auto h-16 w-16 flex items-center justify-center rounded-full bg-green-100 mb-6">
            <svg class="h-8 w-8 text-green-600" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M4.5 12.75l6 6 9-13.5"/></svg>
        </div>
        <h1 class="text-3xl font-bold tracking-tight text-gray-900">Message envoyé !</h1>
        <p class="mt-4 text-lg text-gray-600">Merci pour votre message. Nous reviendrons vers vous dans les meilleurs délais.</p>
        <div class="mt-8">
            <a href="/" class="inline-flex items-center rounded-lg bg-blue-700 px-6 py-3 text-base font-semibold text-white shadow-sm hover:bg-blue-800 transition-colors">
                Retour à l'accueil
            </a>
        </div>
    </div>
</section>
{% endblock %}
