{% extends "base.html" %}
{% load wagtailcore_tags %}

{% block title %}{{ page.title }} — {{ SITE_NAME }}{% endblock %}
{% block meta_description %}{{ page.search_description|default:page.title }}{% endblock %}

{% block content %}
<article class="py-16 lg:py-24">
    <div class="mx-auto max-w-3xl px-4 sm:px-6 lg:px-8">
        <header class="mb-10 hero-entrance">
            <h1 class="hero-el hero-el-1 text-4xl font-bold tracking-tight text-navy-900">{{ page.title }}</h1>
            <hr class="hero-el hero-el-2 divider-gold mt-6">
        </header>
        <div class="prose prose-lg max-w-none reveal reveal-delay-1">
            {% include_block page.body %}
        </div>
    </div>
</article>
{% endblock %}
