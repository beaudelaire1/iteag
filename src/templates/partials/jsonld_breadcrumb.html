{# JSON-LD BreadcrumbList — CDC §15 SEO #}
{# Usage: {% include "partials/jsonld_breadcrumb.html" with items=breadcrumb_items %} #}
{% if items %}
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "BreadcrumbList",
  "itemListElement": [{% for item in items %}
    {
      "@type": "ListItem",
      "position": {{ forloop.counter }},
      "name": "{{ item.label|escapejs }}"{% if item.url %},
      "item": "{{ request.scheme }}://{{ request.get_host }}{{ item.url }}"{% endif %}
    }{% if not forloop.last %},{% endif %}{% endfor %}
  ]
}
</script>
{% endif %}
