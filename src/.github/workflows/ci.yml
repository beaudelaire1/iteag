name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.12"
  DJANGO_SETTINGS_MODULE: config.settings.test

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - run: pip install ruff
      - run: ruff check .
      - run: ruff format --check .

  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: lint
    defaults:
      run:
        working-directory: src
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: iteag_test
          POSTGRES_USER: iteag
          POSTGRES_PASSWORD: iteag_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: src/requirements/dev.txt
      - run: pip install -r requirements/dev.txt
      - name: Run tests
        env:
          DATABASE_URL: postgres://iteag:iteag_test@localhost:5432/iteag_test
          SECRET_KEY: ci-test-secret-key-not-for-production
        run: pytest --cov=apps --cov-report=xml -q
      - uses: codecov/codecov-action@v4
        if: always()
        with:
          file: src/coverage.xml
          fail_ci_if_error: false

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: lint
    defaults:
      run:
        working-directory: src
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - run: pip install pip-audit
      - run: pip-audit -r requirements/base.txt
